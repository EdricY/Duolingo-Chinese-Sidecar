<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duolingo Flashcards</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#58cc02">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #58cc02;
            --primary-dark: #46a302;
            --secondary: #1cb0f6;
            --accent: #ffc800;
            --bg: #f7f7f7;
            --text: #3c3c3c;
            --card-bg: #ffffff;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100%;
            padding: 20px;
            transition: justify-content 0.3s ease;
        }

        body.quiz-mode {
            justify-content: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .container {
            margin-block: auto;
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
        }

        /* Setup Screen */
        #setup-screen {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .group-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            min-height: 400px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 12px;
            background: #fafafa;
        }

        .group-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #fdfdfd;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }

        @media (hover: hover) {
            .group-item:hover {
                border-color: var(--primary);
                background: #f0fff0;
            }
        }

        .group-item.selected {
            border-color: var(--primary);
            background: #e8f5e9;
        }

        .group-item input,
        .group-item label {
            cursor: pointer;
        }

        #setup-screen label {
            cursor: pointer;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 0 var(--primary-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (hover: hover) {
            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 0 var(--primary-dark);
            }
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 var(--primary-dark);
        }

        .btn-secondary {
            background: var(--secondary);
            box-shadow: 0 4px 0 #1899d6;
        }

        @media (hover: hover) {
            .btn-secondary:hover {
                box-shadow: 0 6px 0 #1899d6;
            }
        }

        .btn-secondary:active {
            box-shadow: 0 0 0 #1899d6;
        }

        /* Quiz Screen */
        #quiz-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
        }

        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            max-width: 500px;
            height: 350px;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: var(--card-shadow);
            border: 2px solid #eee;
        }

        .card-front {
            background: white;
            color: var(--text);
        }

        .card-back {
            background: linear-gradient(135deg, #f0fff0, #e8f5e9);
            color: var(--text);
            transform: rotateY(180deg);
        }

        .word {
            font-size: 4rem;
            margin-bottom: 10px;
            font-weight: 700;
            text-align: center;
        }

        .pinyin {
            font-size: 1.5rem;
            color: #777;
            text-align: center;
        }

        .definition {
            font-size: 1.8rem;
            text-align: center;
            line-height: 1.4;
        }

        .card-front .definition {
            font-size: 2.5rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }

        .progress-container {
            width: 100%;
            background: #eee;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: var(--transition);
        }

        .stats {
            font-weight: 600;
            color: #777;
        }

        .translate-link {
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: var(--transition);
        }

        @media (hover: hover) {
            .translate-link:hover {
                color: var(--primary);
            }
        }

        .translate-link svg {
            width: 18px;
            height: 18px;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .word {
                font-size: 3rem;
            }

            .pinyin {
                font-size: 1.2rem;
            }

            .definition {
                font-size: 1.4rem;
            }

            .flashcard-container {
                height: 300px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1 id="main-title">Duolingo Flashcards</h1>
        <p id="sub-title">Master your Chinese vocabulary</p>
    </header>

    <div class="container fade-in">
        <!-- Setup Screen -->
        <div id="setup-screen">
            <div id="language-selector" style="margin-bottom: 20px;">
                <h2>Select Language</h2>
                <div style="display: flex; gap: 20px; background: #eee; padding: 10px; border-radius: 12px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="language" value="chinese" checked
                            onchange="handleLanguageChange('chinese')">
                        <span style="font-weight: 600;">Chinese</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="language" value="swahili" onchange="handleLanguageChange('swahili')">
                        <span style="font-weight: 600;">Swahili</span>
                    </label>
                </div>
            </div>

            <h2>Select Groups to Quiz</h2>
            <div class="controls" style="justify-content: flex-start; margin-bottom: 10px;">
                <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.8rem;"
                    onclick="toggleAll(true)">Select All</button>
                <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.8rem;"
                    onclick="toggleAll(false)">Deselect All</button>
            </div>
            <div class="group-list" id="group-list">
                <!-- Groups will be populated here -->
                <p style="grid-column: 1/-1; text-align: center; padding-top: 150px; color: #777;">Loading groups...</p>
            </div>
            <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px;">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="checkbox" id="shuffle" checked onchange="saveSettings()">
                    <label for="shuffle">Shuffle cards</label>
                </div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="checkbox" id="def-first" onchange="saveSettings()">
                    <label for="def-first">Definition first</label>
                </div>
            </div>
            <div style="display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap;">
                <button id="start-btn" class="btn" style="flex: 3; min-width: 200px;" onclick="startQuiz()">Start
                    Quiz</button>
                <button id="start-starred-btn" class="btn btn-secondary" style="flex: 1; min-width: 200px;"
                    onclick="startStarredQuiz()">Quiz ⭐ (<span id="starred-count-btn">0</span>)</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen">
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div class="stats" id="stats">Card 1 of 10</div>

            <div
                style="display: flex; gap: 30px; align-items: center; justify-content: center; flex-wrap: wrap; margin-bottom: 10px;">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="checkbox" id="auto-speak" onchange="saveSettings(); if(this.checked) speakWord()">
                    <label for="auto-speak" id="auto-speak-label"
                        style="user-select: none; cursor: pointer;">Auto-speak</label>
                </div>
                <a id="translate-link" href="#" target="_blank" class="translate-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="m5 8 6 6" />
                        <path d="m4 14 6-6 2-3" />
                        <path d="M2 5h12" />
                        <path d="M7 2h1" />
                        <path d="m22 22-5-10-5 10" />
                        <path d="M14 18h6" />
                    </svg>
                    Google Translate
                </a>
                <button id="star-btn" onclick="toggleStar()"
                    style="background: none; border: none; padding: 5px; cursor: pointer; color: #999; display: flex; align-items: center; justify-content: center; transition: transform 0.2s;"
                    title="Star word">
                    <svg id="star-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                </button>
            </div>

            <div class="flashcard-container" onclick="flipCard()">
                <div class="flashcard" id="flashcard">
                    <div class="card-face card-front">
                        <!-- Content will be injected here -->
                    </div>
                    <div class="card-face card-back">
                        <!-- Content will be injected here -->
                    </div>
                </div>
            </div>


            <div class="controls">
                <button class="btn btn-secondary" onclick="prevCard()">Previous</button>
                <button class="btn" onclick="nextCard()">Next</button>
            </div>
            <button class="btn btn-secondary" style="margin-top: 10px;" onclick="exitQuiz()">Exit Quiz</button>
        </div>
    </div>

    <footer style="padding-top: 40px; text-align: center; font-size: 0.9rem;">
        <a href="https://github.com/EdricY/Duolingo-Flashcards" target="_blank"
            style="color: var(--secondary); text-decoration: none; font-weight: 600; transition: var(--transition);">
            Report issues and view source on GitHub
        </a>
    </footer>

    <script>
        let allWords = {};
        let quizWords = [];
        let currentIndex = 0;
        let lastChecked = null;
        let currentLanguage = 'chinese';

        const languageConfigs = {
            chinese: {
                file: 'words-chinese.json',
                speechCode: 'zh-CN',
                translateCode: 'zh-CN',
                title: 'Chinese Flashcards',
                subtitle: 'Master your Chinese vocabulary',
                speakLabel: 'Auto-speak Chinese'
            },
            swahili: {
                file: 'words-swahili.json',
                speechCode: 'sw-TZ',
                translateCode: 'sw',
                title: 'Swahili Flashcards',
                subtitle: 'Master your Swahili vocabulary',
                speakLabel: 'Auto-speak Swahili'
            }
        };

        async function loadWords() {
            const savedLang = localStorage.getItem('currentLanguage') || 'chinese';
            const radio = document.querySelector(`input[name="language"][value="${savedLang}"]`);
            if (radio) radio.checked = true;

            await handleLanguageChange(savedLang, false);
        }

        function getStarredWords() {
            return JSON.parse(localStorage.getItem(`starredWords_${currentLanguage}`) || '[]');
        }

        function saveStarredWords(words) {
            localStorage.setItem(`starredWords_${currentLanguage}`, JSON.stringify(words));
        }

        function toggleStar() {
            const wordObj = quizWords[currentIndex];
            if (!wordObj) return;
            let starred = getStarredWords();
            const index = starred.indexOf(wordObj.word);

            const starIcon = document.getElementById('star-icon');

            if (index > -1) {
                starred.splice(index, 1);
                starIcon.setAttribute('fill', 'none');
                starIcon.setAttribute('stroke', 'currentColor');
            } else {
                starred.push(wordObj.word);
                starIcon.setAttribute('fill', 'var(--accent)');
                starIcon.setAttribute('stroke', 'var(--accent)');
            }
            saveStarredWords(starred);
        }

        async function handleLanguageChange(lang, shouldSave = true) {
            currentLanguage = lang;
            if (shouldSave) {
                localStorage.setItem('currentLanguage', lang);
                // Clear selected groups when changing language
                localStorage.removeItem('selectedGroups');
            }

            const config = languageConfigs[lang];

            // Update UI text
            document.getElementById('main-title').textContent = config.title;
            document.getElementById('sub-title').textContent = config.subtitle;
            document.getElementById('auto-speak-label').textContent = config.speakLabel;
            document.title = 'Duolingo Flashcards - ' + config.title;

            const groupList = document.getElementById('group-list');
            groupList.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding-top: 150px; color: #777;">Loading groups...</p>';

            try {
                const response = await fetch(config.file);
                allWords = await response.json();
                populateGroups();
            } catch (error) {
                console.error('Error loading words:', error);
                groupList.innerHTML = `<p>Error loading ${config.file}. Make sure it exists in the same directory.</p>`;
            }
        }

        function populateGroups() {
            const groupList = document.getElementById('group-list');
            groupList.innerHTML = '';

            const savedGroups = JSON.parse(localStorage.getItem('selectedGroups') || '[]');

            const starredWords = getStarredWords();
            const btnSpan = document.getElementById('starred-count-btn');
            if (btnSpan) btnSpan.textContent = starredWords.length;

            Object.keys(allWords).forEach(groupName => {
                const div = document.createElement('div');
                div.className = 'group-item';
                const isSelected = savedGroups.includes(groupName);
                if (isSelected) div.classList.add('selected');

                div.innerHTML = `
                    <input type="checkbox" value="${groupName}" id="chk-${groupName}" ${isSelected ? 'checked' : ''}>
                    <label for="chk-${groupName}">${groupName} (${allWords[groupName].length} words)</label>
                `;
                div.onclick = (e) => {
                    const chk = div.querySelector('input');
                    let targetToggled = false;

                    if (e.target === chk) {
                        targetToggled = true;
                    } else if (e.target.tagName !== 'LABEL') {
                        chk.checked = !chk.checked;
                        targetToggled = true;
                    }

                    if (targetToggled) {
                        if (e.shiftKey && lastChecked !== null) {
                            const checkboxes = Array.from(document.querySelectorAll('#group-list input'));
                            const start = checkboxes.indexOf(lastChecked);
                            const end = checkboxes.indexOf(chk);

                            checkboxes.slice(Math.min(start, end), Math.max(start, end) + 1).forEach(c => {
                                c.checked = chk.checked;
                                updateGroupStyle(c.parentElement, chk.checked);
                            });
                        }
                        updateGroupStyle(div, chk.checked);
                        lastChecked = chk;
                        saveSettings();
                    }
                };
                groupList.appendChild(div);
            });

            // Load other settings
            const shuffle = localStorage.getItem('shuffleCards');
            if (shuffle !== null) document.getElementById('shuffle').checked = shuffle === 'true';

            const defFirst = localStorage.getItem('defFirst');
            if (defFirst !== null) document.getElementById('def-first').checked = defFirst === 'true';

            const autoSpeak = localStorage.getItem('autoSpeak');
            if (autoSpeak !== null) document.getElementById('auto-speak').checked = autoSpeak === 'true';
        }

        function saveSettings() {
            const selected = Array.from(document.querySelectorAll('#group-list input:checked')).map(cb => cb.value);
            localStorage.setItem('selectedGroups', JSON.stringify(selected));
            localStorage.setItem('shuffleCards', document.getElementById('shuffle').checked);
            localStorage.setItem('defFirst', document.getElementById('def-first').checked);
            localStorage.setItem('autoSpeak', document.getElementById('auto-speak').checked);
        }

        function updateGroupStyle(element, isSelected) {
            if (isSelected) element.classList.add('selected');
            else element.classList.remove('selected');
        }

        function toggleAll(selected) {
            document.querySelectorAll('#group-list input').forEach(chk => {
                chk.checked = selected;
                updateGroupStyle(chk.parentElement, selected);
            });
            lastChecked = null;
            saveSettings();
        }

        function startStarredQuiz() {
            const starredStrs = getStarredWords();
            if (starredStrs.length === 0) {
                alert('You have no starred words for this language!');
                return;
            }

            const uniqueWords = new Map();
            Object.values(allWords).forEach(group => {
                group.forEach(wordObj => {
                    if (starredStrs.includes(wordObj.word) && !uniqueWords.has(wordObj.word)) {
                        uniqueWords.set(wordObj.word, wordObj);
                    }
                });
            });

            quizWords = Array.from(uniqueWords.values());

            if (quizWords.length === 0) {
                alert('No words found in the dataset for your starred words!');
                return;
            }

            if (document.getElementById('shuffle').checked) {
                quizWords.sort(() => Math.random() - 0.5);
            }

            currentIndex = 0;
            showScreen('quiz-screen');
            updateCard();
        }

        function startQuiz() {
            const selectedGroups = Array.from(document.querySelectorAll('#group-list input:checked')).map(cb => cb.value);

            if (selectedGroups.length === 0) {
                alert('Please select at least one group!');
                return;
            }

            quizWords = [];
            selectedGroups.forEach(group => {
                quizWords = quizWords.concat(allWords[group]);
            });

            // Filter duplicates if any
            const unique = new Map();
            quizWords.forEach(w => unique.set(w.word, w));
            quizWords = Array.from(unique.values());

            if (document.getElementById('shuffle').checked) {
                quizWords.sort(() => Math.random() - 0.5);
            }

            currentIndex = 0;
            showScreen('quiz-screen');
            updateCard();
        }

        function showScreen(screenId) {
            document.getElementById('setup-screen').style.display = screenId === 'setup-screen' ? 'flex' : 'none';
            document.getElementById('quiz-screen').style.display = screenId === 'quiz-screen' ? 'flex' : 'none';
            document.querySelector('header').style.display = screenId === 'setup-screen' ? 'block' : 'none';

            if (screenId === 'quiz-screen') {
                document.body.classList.add('quiz-mode');
            } else {
                document.body.classList.remove('quiz-mode');
            }

            const btnSpan = document.getElementById('starred-count-btn');
            if (btnSpan) btnSpan.textContent = getStarredWords().length;
        }

        let updateTimeout = null;

        function updateCard() {
            if (updateTimeout) clearTimeout(updateTimeout);

            const wordObj = quizWords[currentIndex];
            const flashcard = document.getElementById('flashcard');
            const isFlipped = flashcard.classList.contains('flipped');
            const defFirst = document.getElementById('def-first').checked;

            const frontFace = flashcard.querySelector('.card-front');
            const backFace = flashcard.querySelector('.card-back');

            const config = languageConfigs[currentLanguage];
            const pinyinHTML = wordObj.pinyin ? `<div class="pinyin">${wordObj.pinyin}</div>` : '';
            const wordHTML = `<div class="word">${wordObj.word}</div>${pinyinHTML}`;
            const definitionHTML = `<div class="definition">${wordObj.definition}</div>`;

            // Always update front immediately
            frontFace.innerHTML = defFirst ? definitionHTML : wordHTML;

            const updateBack = () => {
                backFace.innerHTML = defFirst ? wordHTML : definitionHTML;
            };

            if (isFlipped) {
                flashcard.classList.remove('flipped');
                // Delay update to prevent it "flashing" while the card is still turning
                updateTimeout = setTimeout(() => {
                    updateBack();
                    updateTimeout = null;
                }, 200);
            } else {
                updateBack();
            }

            if (document.getElementById('auto-speak').checked && !defFirst) {
                // Speak immediately if word is on front
                setTimeout(speakWord, 100);
            }

            // Update translate link
            const translateLink = document.getElementById('translate-link');
            translateLink.href = `https://translate.google.com/?sl=${config.translateCode}&tl=en&text=${encodeURIComponent(wordObj.word)}&op=translate`;

            // Update star icon
            const starred = getStarredWords();
            const starIcon = document.getElementById('star-icon');
            if (starred.includes(wordObj.word)) {
                starIcon.setAttribute('fill', 'var(--accent)');
                starIcon.setAttribute('stroke', 'var(--accent)');
            } else {
                starIcon.setAttribute('fill', 'none');
                starIcon.setAttribute('stroke', 'currentColor');
            }

            // Update stats & progress
            document.getElementById('stats').textContent = `Card ${currentIndex + 1} of ${quizWords.length}`;
            const progress = ((currentIndex + 1) / quizWords.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
        }

        function flipCard() {
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.toggle('flipped');

            const isFlipped = flashcard.classList.contains('flipped');
            const defFirst = document.getElementById('def-first').checked;
            const autoSpeak = document.getElementById('auto-speak').checked;

            if (autoSpeak) {
                const showingWord = (defFirst && isFlipped) || (!defFirst && !isFlipped);
                if (showingWord) {
                    speakWord();
                }
            }
        }

        function speakWord() {
            const wordObj = quizWords[currentIndex];
            if (!wordObj) return;

            // Stop any current speech
            window.speechSynthesis.cancel();

            const config = languageConfigs[currentLanguage];
            const utterance = new SpeechSynthesisUtterance(wordObj.word);
            utterance.lang = config.speechCode;
            utterance.rate = 0.9; // Slightly slower for better clarity

            window.speechSynthesis.speak(utterance);
        }

        function nextCard() {
            if (currentIndex < quizWords.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        function exitQuiz() {
            showScreen('setup-screen');
        }

        // Initialize
        loadWords();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
